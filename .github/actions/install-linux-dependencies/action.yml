name: Install Linux Dependencies
description: Install Linux packages required for CI builds

runs:
  using: composite
  steps:
    - name: Install apt packages
      shell: bash
      run: sudo apt-get update -y && sudo apt-get install -y pkg-config libwayland-dev libx11-dev libxcb1-dev libxi-dev libxkbcommon-dev libxkbcommon-x11-dev
